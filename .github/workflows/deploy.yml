name: Continuous Integration & Deployment (GCP Cloud Run)

on:
  push:
    branches:
      - version1  # Triggers the pipeline when pushing to the version1 branch

env:
  PROJECT_ID: apex-501001
  REGION: us-central1
  REPOSITORY: apex-repo
  SERVICE: apex-web-app
  IMAGE_NAME: apex-app

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Authenticate with Google Cloud
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Store your GCP Service Account JSON key in GitHub Secrets

      # Step 3: Set up Cloud SDK (gcloud CLI)
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Step 4: Configure Docker to use gcloud as a credential helper
      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Step 5: Set up Docker Buildx (enables caching and advanced builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6: Build and Push Docker image to Artifact Registry
      - name: Build and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha # Leverages GitHub Actions cache for incredibly fast builds
          cache-to: type=gha,mode=max

      # Step 7: Deploy the pushed image to Cloud Run with scale-to-zero settings
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          # Retains scale-to-zero and dynamic CPU scaling for absolute $0/month costs:
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=2
            --cpu=1
            --memory=512Mi
